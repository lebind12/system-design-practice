# stage3·stage4 에서 사용. c=500/c=1000 초기 실험이 EOF 에러로 무너졌던 이유와
# 각 수정의 효과:
#
#   (A) worker_connections 4096
#       기본값 512. 한 worker 가 동시에 다룰 수 있는 TCP 소켓 수.
#       c=1000 + upstream 2개 + 각종 메타 연결이면 512 는 바로 포화.
#
#   (B) upstream { keepalive 64; }
#       이게 없으면 nginx 는 요청마다 app 컨테이너로 새 TCP 연결을 연다.
#       c=500 이면 초당 수천 개의 새 연결 + TIME_WAIT 누적 → 소켓 고갈 → EOF.
#       keepalive 64 는 worker 당 유휴 upstream 커넥션 64 개를 풀에 유지.
#
#   (C) proxy_http_version 1.1 + proxy_set_header Connection ""
#       (B) 를 실제로 유효하게 만드는 짝. HTTP/1.0 또는 Connection: close 가
#       남아 있으면 upstream keepalive 가 매 요청 종료 후 끊긴다.
#
# 이 세 가지는 "LB 뒤에 stateless 복제를 둔다" 는 결정의 전제조건이다.
# 책 1장은 개념만 언급하고, 실제 동작하려면 이 튜닝이 없어선 안 된다.

events {
  worker_connections 4096;
}

http {
  upstream backend {
    server app1:8080;
    server app2:8080;
    keepalive 64;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
    }
  }
}
