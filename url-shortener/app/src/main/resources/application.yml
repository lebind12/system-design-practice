server:
  port: 8080

spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:url_shortener}
    username: ${POSTGRES_USER:app}
    password: ${POSTGRES_PASSWORD:app}
    hikari:
      maximum-pool-size: 20
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false

app:
  cache-enabled: ${CACHE_ENABLED:false}
  key-strategy: ${KEY_STRATEGY:base62}
